schema: spec-driven


## Architecture Constraints
1. **统一 Catalog**: 所有表元数据操作必须通过 Gravitino 进行，禁止直接访问底层 Catalog。
2. **分层架构**: Controller → Service → Repository/Catalog → Storage，严格遵守分层依赖方向。
3. **配置管理**: 敏感信息（密钥、密码）使用环境变量或配置加密，禁止硬编码。
4. **Spark 集成**: Spark 作业通过 Gravitino Spark Connector 访问 Iceberg 表，需设置 `spark.sql.gravitino.enableIcebergSupport=true`。
5. **MinIO 存储**: 所有数据文件存储在 MinIO，Iceberg 表指向 MinIO 路径。

## Code Quality Rules
1. **文件大小**: 单个 Java 文件不超过 500 行，超过需拆分。
2. **方法复杂度**: 单个方法不超过 50 行，圈复杂度不超过 10。
3. **命名规范**:
   - 类名: PascalCase
   - 方法/变量: camelCase
   - 常量: UPPER_SNAKE_CASE
   - 包名: 全小写，使用公司域名倒序
4. **注释要求**: 所有 public 方法必须有 Javadoc，复杂逻辑需有行内注释。
5. **空值处理**: 优先使用 Optional，禁止返回 null 集合。
6. **日志规范**: 使用 Lombok 的 `@Slf4j` 注解，禁止使用 System.out.println。

## TDD Requirements
1. **测试先行**: 先写测试，再写实现代码——测试用例是与 AI 签订的"合同"，只有通过所有测试才算完成任务。
2. **测试覆盖率**:
   - Service 层: ≥ 80% 行覆盖率
   - 核心业务逻辑: ≥ 90% 分支覆盖率
3. **测试框架**: JUnit 5 + Mockito + AssertJ。
4. **集成测试**: 使用 Testcontainers 启动 Gravitino、MinIO 等依赖服务。
5. **测试结构**: 遵循 AAA (Arrange-Act-Assert) 模式。
6. **测试命名**: `should_ExpectedBehavior_When_StateUnderTest`。

## Security Guardrails
> ⚠️ AI 代理在执行以下操作前**必须**请求用户确认：
- 任何涉及数据库写操作（INSERT、UPDATE、DELETE、MERGE）
- 修改 `application*.yml` 中的配置
- 执行 Spark 作业提交
- 修改 Gravitino Catalog 定义
- 执行部署相关脚本
- 修改 `pom.xml` 中的依赖版本

## Git Conventions
- **提交格式**: `type(scope): subject`（遵循 Conventional Commits）
  - type: feat, fix, docs, test, refactor, chore
- **分支命名**: `feature/xxx`, `fix/xxx`, `docs/xxx`
- **PR 大小**: 单次 PR 变更不超过 500 行

## Prohibited Actions
- ❌ 禁止在 Service 层直接操作 SparkSession
- ❌ 禁止绕过 Gravitino 直接访问 Iceberg Catalog
- ❌ 禁止在代码中硬编码密钥、密码、Token
- ❌ 禁止使用 System.out.println 进行日志输出（使用 Slf4j）
- ❌ 禁止吞没异常（catch 后不处理也不抛出）
- ❌ 禁止在生产代码中使用 deprecated API

rules:
proposal:
  - 必须明确问题背景、目标用户和价值主张
  - 必须说明与现有功能的关系，避免功能重叠
  - 涉及架构变更时，必须评估对现有系统的影响
  - 包含安全考量（数据访问权限、敏感信息处理）
specs:
  - 使用 Given-When-Then 格式描述用户场景
  - 每个需求必须有明确的验收标准
  - 区分功能需求和非功能需求（性能、安全、可用性）
  - 对于 API 设计，必须包含请求/响应格式定义
  - 涉及 Gravitino Catalog 操作时，必须明确 Metalake 和 Catalog 命名空间
design:
  - 必须包含技术选型理由，不单纯描述"用什么"
  - 对于 Spark 作业，必须说明资源预估和并行度设计
  - 涉及数据操作时，必须说明事务边界和一致性保证
  - 对于 Gravitino 集成，必须说明 Catalog 操作的重试和容错策略
  - 必须标注 Open Questions 供后续讨论
tasks:
  - 任务粒度：每个任务应在 2-4 小时内可完成
  - 任务依赖：明确标注前置任务
  - 测试要求：每个实现任务必须对应至少一个测试任务
  - 验收标准：每个任务必须有明确的完成定义（Definition of Done）
  - 禁止在 tasks.md 中包含实现细节代码片段